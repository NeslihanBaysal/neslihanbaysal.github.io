<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Block Breaker</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #1b1035 0%, #2c1250 50%, #0f1a3d 100%);
    color: #f5f3ff;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  main { max-width: 480px; }
  h1 {
    font-size: 2.25rem;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  p.tagline {
    margin: 0 0 32px;
    opacity: 0.75;
    font-size: 1.05rem;
  }
  .blocks {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 32px;
  }
  .blocks span {
    display: block;
    height: 14px;
    border-radius: 3px;
  }
  .blocks span:nth-child(6n+1) { background: #ff6b6b; }
  .blocks span:nth-child(6n+2) { background: #feca57; }
  .blocks span:nth-child(6n+3) { background: #1dd1a1; }
  .blocks span:nth-child(6n+4) { background: #54a0ff; }
  .blocks span:nth-child(6n+5) { background: #a29bfe; }
  .blocks span:nth-child(6n)   { background: #ff9ff3; }
  a.link {
    display: inline-block;
    color: #cdb8ff;
    text-decoration: none;
    margin: 6px;
    font-size: 0.95rem;
  }
</style>
</head>
<body>
<main>
  <div class="blocks">
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <h1>Block Breaker</h1>
  <p class="tagline">Klasik tuğla kırma oyunu — refleks ve skor odaklı, bağımlılık yapan bir retro deneyim.</p>
  <div>
    <a class="link" href="https://neslihanbaysal.github.io/blockbreaker-support/">Destek</a>
  </div>
</main>
</body>
</html>
